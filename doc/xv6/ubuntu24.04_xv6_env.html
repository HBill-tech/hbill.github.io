<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubuntu-24.04中配置xv6运行环境指南</title>
    <link rel="stylesheet" href="../doc.css">
    <link rel="stylesheet" href="../../link_style.css">
    <link rel="stylesheet" href="../../index.css">
    <link rel="stylesheet" href="../../font.css">
    <script src="../../scripts/componet.js" defer></script>
</head>

<body>
    <div class="container">
        <hdoc-title>在Ubuntu-24.04中配置xv6的运行环境</hdoc-title>
        <div class="note">
            <p>下载make</p>
            <div class="code">sudo apt install make</div>
            <p>下载gcc交叉编译器</p>
            <div class="code">sudo apt install gcc-riscv64-linux-gnu</div>
            <p>下载xv6源代码</p>
            <div class="code">git clone https://github.com/mit-pdos/xv6-riscv.git</div>
            <p>下载qemu-system-riscv64</p>
            <div class="code">sudo apt install qemu-system-riscv64</div>
            <p>下载好之后进入 xv6-riscv 目录：</p>
            <div class="code">cd xv6-riscv</div>
            <p>然后运行：</p>
            <div class="code">make qemu</div>
        </div>
        <a href="../../index.html">返回主页</a>
    </div>
</body>

</html>
