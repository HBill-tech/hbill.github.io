        <hdoc-title>如何录制rosbag</hdoc-title>
        <div class="note">
            <p>首先，启动传感器，输入以下命令查看当前的rostopic有哪些。</p>
            <div class="code">rostopic list</div>
            <p>输入以下命令，录制当前所有的rostopic</p>
            <div class="code">rosbag record -a</div>
            <p>使用 Ctrl + C 切断录制，此时录制的rosbag文件保存在了当前目录下</p>
